<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Bear Bins</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Bear Bins — BLE Packets</h1>
    <div class="controls">
      <input id="mac" placeholder="Filter by MAC (optional)" />
      <button id="refresh">Refresh</button>
      <button id="more">Load more</button>
    </div>
    <div id="status"></div>
  </header>

  <main>
    <table>
      <thead>
        <tr>
          <th>Server Time</th>
          <th>MAC</th>
          <th>RSSI</th>
          <th>Counter</th>
          <th>Switch</th>
          <th>Payload</th>
          <th>Beacon</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
  </main>

  <script src="app.js"></script>
</body>
</html>
